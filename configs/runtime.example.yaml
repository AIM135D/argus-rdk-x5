# Copy to configs/runtime.yaml before changing values.
# Environment variables such as ARGUS_MODEL_PATH override this file.
hardware_enabled: false
servo_enabled: false
buzzer_enabled: false
light_enabled: false
llm_bridge_enabled: false

host: 127.0.0.1
port: 8000
camera_index: 0

model_path: models/argus_ppe_dfl_640_rdkx5.bin
danger_zone_file: configs/danger_zones.runtime.json
servo_calibration_file: configs/servo_calibration.runtime.json

esp32_port: /dev/ttyUSB0
esp32_baudrate: 115200
esp32_protocol: A
esp32_send_hz: 12.0

stream_width: 640
stream_height: 360
jpeg_quality: 50
score_threshold: 0.40
nms_threshold: 0.70
nms_top_k: 50
