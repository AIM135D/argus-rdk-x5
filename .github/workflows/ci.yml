name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Hardware-free checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install test dependency
        run: python -m pip install "PyYAML>=6,<7"

      - name: Compile Python sources
        run: python -m compileall -q online offline tests scripts

      - name: Run core tests
        run: python -m unittest discover -s tests -v

      - name: Validate repository contract
        run: python scripts/validate_repository.py
